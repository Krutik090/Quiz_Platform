services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    # Caps WiredTiger's cache so Mongo doesn't grab the default (RAM-1GB)/2 — fine on a big
    # box, but on a 1GB VPS that leaves almost nothing for everything else.
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    mem_limit: 400m
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru"]
    mem_limit: 150m
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: tribastion-server:latest
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_OPTIONS: --max-old-space-size=192
      MONGO_URI: mongodb://mongo:27017/tribastion
      REDIS_URL: redis://redis:6379
    env_file:
      - apps/server/.env
    mem_limit: 300m
    volumes:
      - server-uploads:/repo/apps/server/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    image: tribastion-client:latest
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    restart: unless-stopped
    mem_limit: 64m
    expose:
      - "80"
    depends_on:
      - server

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 192m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - client

volumes:
  mongo-data:
  redis-data:
  server-uploads:
  caddy-data:
  caddy-config:
