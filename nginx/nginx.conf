map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Docker's embedded DNS (127.0.0.11) hands out a new IP every time the "server" container is
  # recreated. A plain `proxy_pass http://server:4000` resolves once at worker-process start and
  # caches that IP forever, so redeploying just the server container (without restarting nginx
  # too) leaves nginx pointing at a dead address — the exact cause of an otherwise-mysterious 502.
  # Routing through a variable forces nginx to honor the resolver's TTL and re-resolve instead.
  resolver 127.0.0.11 valid=10s;
  set $server_upstream http://server:4000;

  location /api/ {
    proxy_pass $server_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass $server_upstream/health;
    proxy_set_header Host $host;
  }

  location /uploads/ {
    proxy_pass $server_upstream;
    proxy_set_header Host $host;
  }

  location /socket.io/ {
    proxy_pass $server_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
